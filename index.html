<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานที่ท่องเที่ยวในประเทศไทย</title>
</head>
<body>

    <header>
        <h1>สถานที่ท่องเที่ยวในประเทศไทย</h1>
        <p>รวบรวมสถานที่ท่องเที่ยวที่สวยงามทั่วประเทศไทย</p>
    </header>

    <hr>

    <main>

        <figure>
            <img src="images/place1.jpg" alt="วัดอรุณราชวราราม" width="300">
            <figcaption>วัดอรุณราชวราราม กรุงเทพมหานคร</figcaption>
        </figure>

        <figure>
            <img src="images/place2.jpg" alt="ดอยอินทนนท์" width="300">
            <figcaption>อุทยานแห่งชาติดอยอินทนนท์ จังหวัดเชียงใหม่</figcaption>
        </figure>

        <figure>
            <img src="images/place3.jpg" alt="เกาะพีพี" width="300">
            <figcaption>เกาะพีพี จังหวัดกระบี่</figcaption>
        </figure>

        <figure>
            <img src="images/place4.jpg" alt="ทะเลแหวก" width="300">
            <figcaption>ทะเลแหวก จังหวัดกระบี่</figcaption>
        </figure>

        <figure>
            <img src="images/place5.jpg" alt="ภูชี้ฟ้า" width="300">
            <figcaption>ภูชี้ฟ้า จังหวัดเชียงราย</figcaption>
        </figure>

        <figure>
            <img src="images/place6.jpg" alt="อุทยานประวัติศาสตร์สุโขทัย" width="300">
            <figcaption>อุทยานประวัติศาสตร์สุโขทัย จังหวัดสุโขทัย</figcaption>
        </figure>

    </main>

    <hr>

    <footer>
        <p>เว็บไซต์แนะนำสถานที่ท่องเที่ยวในประเทศไทย</p>
    </footer>

</body>
</html>
